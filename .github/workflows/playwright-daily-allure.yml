name: Daily Playwright + Allure

on:
  schedule:
    # 06:00 UTC every day
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  test-and-publish-allure:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install dependencies
        run: npm ci

      - name: Generate config.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: node scripts/generate-config.mjs

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run Playwright tests
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          STAFF_EMAIL: ${{ secrets.STAFF_EMAIL }}
          STAFF_PASSWORD: ${{ secrets.STAFF_PASSWORD }}
          CI: true
        run: npm test

      - name: Load Allure history from reports repo
        if: always()
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.ALLURE_REPORTS_REPO }}
          ref: gh-pages
          path: gh-pages
          ssh-key: ${{ secrets.ALLURE_REPORTS_DEPLOY_KEY }}

      - name: Restore Allure history
        if: always()
        run: |
          if [ -d gh-pages/history ]; then
            cp -r gh-pages/history allure-results/history
          fi

      - name: Generate Allure report
        if: always()
        run: npm run allure:generate

      - name: Upload Allure report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-${{ github.run_number }}
          path: |
            allure-report/
            allure-results/
          retention-days: 30

      - name: Publish Allure to reports repo (GitHub Pages)
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          deploy_key: ${{ secrets.ALLURE_REPORTS_DEPLOY_KEY }}
          external_repository: ${{ secrets.ALLURE_REPORTS_REPO }}
          publish_branch: gh-pages
          publish_dir: ./allure-report
          keep_files: false
