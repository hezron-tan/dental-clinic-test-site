<!DOCTYPE HTML>
<html>
	<head>
		<title>Staff Login — Dental Clinic</title>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
		<link rel="stylesheet" href="assets/css/main.css" />
		<noscript><link rel="stylesheet" href="assets/css/noscript.css" /></noscript>
		<link rel="stylesheet" href="css/app.css" />
	</head>
	<body class="is-preload">

		<div id="wrapper">
			<header id="header">
				<h1>Staff Portal</h1>
				<p>Sign in to manage clinic and patient records</p>
			</header>

			<center style="margin-bottom:40px">
				<nav id="nav">
					<ul>
						<li><a href="index.html">Public Site</a></li>
						<li><a href="login.html">Login</a></li>
					</ul>
				</nav>
			</center>

			<div id="main">
				<section id="content" class="main">
					<div class="login-box">
						<div id="login-alert" class="alert alert-error" hidden data-testid="login-alert"></div>

						<form id="login-form" data-testid="login-form">
							<div class="form-grid">
								<label for="email">Email</label>
								<input type="email" id="email" name="email" required autocomplete="username" data-testid="login-email" />

								<label for="password">Password</label>
								<input type="password" id="password" name="password" required autocomplete="current-password" data-testid="login-password" />
							</div>
							<ul class="actions" style="margin-top:1.5em">
								<li><button type="submit" class="button primary" data-testid="login-submit">Sign In</button></li>
							</ul>
						</form>

						<p style="margin-top:2em;font-size:0.85em;opacity:0.8">
							Test accounts are created in Supabase Auth. See README for setup.
						</p>
					</div>
				</section>
			</div>

			<footer id="footer">
				<p class="copyright"><a href="index.html">&larr; Back to public site</a></p>
			</footer>
		</div>

		<script src="assets/js/jquery.min.js"></script>
		<script src="assets/js/browser.min.js"></script>
		<script src="assets/js/breakpoints.min.js"></script>
		<script src="assets/js/util.js"></script>
		<script src="assets/js/main.js"></script>
		<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
		<script src="js/config.js"></script>
		<script src="js/supabase-client.js"></script>
		<script src="js/app.js"></script>
		<script src="js/auth.js"></script>
		<script>
			document.addEventListener('DOMContentLoaded', async function () {
				const session = await Auth.getSession();
				if (session) {
					const profile = await Auth.getProfile();
					if (profile) {
						window.location.href = Auth.dashboardPathForRole(profile.role);
						return;
					}
				}

				document.getElementById('login-form').addEventListener('submit', async function (e) {
					e.preventDefault();
					App.hideAlert('login-alert');
					const email = document.getElementById('email').value.trim();
					const password = document.getElementById('password').value;

					try {
						await Auth.signIn(email, password);
						const profile = await Auth.getProfile();
						if (!profile) {
							throw new Error('No profile found for this user. Check Supabase setup.');
						}
						window.location.href = Auth.dashboardPathForRole(profile.role);
					} catch (err) {
						App.handleError('login-alert', err);
					}
				});
			});
		</script>
	</body>
</html>
